<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Meeting Radar Banner</title>

  <style>
    :root {
      --blue-deep: #075985;
      --blue-main: #0b6e99;
      --blue-edge: #1e88b5;
      --text-main: #ffffff;
      --text-soft: rgba(255, 255, 255, 0.82);
      --text-muted: rgba(255, 255, 255, 0.68);
      --line-soft: rgba(255, 255, 255, 0.24);
      --panel-bg: rgba(255, 255, 255, 0.14);
      --panel-border: rgba(255, 255, 255, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: transparent;
      color: var(--text-main);
    }

    .banner {
      width: 100%;
      min-height: 124px;
      padding: 22px 28px;
      border-radius: 18px;
      background:
        radial-gradient(circle at 88% 18%, rgba(255, 255, 255, 0.18), transparent 28%),
        linear-gradient(135deg, var(--blue-deep), var(--blue-main) 58%, var(--blue-edge));
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .banner::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.09) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 36px 36px;
      opacity: 0.28;
      pointer-events: none;
    }

    .left,
    .next-card {
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 750;
      color: var(--text-soft);
    }

    .signal-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #ffffff;
      box-shadow: 0 0 0 5px rgba(255, 255, 255, 0.14);
      flex: 0 0 auto;
    }

    .title {
      margin: 0;
      font-size: clamp(34px, 5.2vw, 56px);
      line-height: 0.94;
      letter-spacing: -0.055em;
      font-weight: 830;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: clamp(14px, 2vw, 18px);
      line-height: 1.35;
      color: var(--text-soft);
      font-weight: 500;
    }

    .next-card {
      min-width: 240px;
      max-width: 330px;
      padding: 16px 18px;
      border-radius: 16px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(8px);
    }

    .next-label {
      margin: 0 0 8px;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 780;
    }

    .next-countdown {
      margin: 0;
      font-size: clamp(30px, 4.4vw, 46px);
      line-height: 0.95;
      letter-spacing: -0.06em;
      font-weight: 840;
      color: #ffffff;
    }

    .next-title {
      margin: 8px 0 0;
      font-size: 14px;
      line-height: 1.25;
      color: rgba(255, 255, 255, 0.92);
      font-weight: 650;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .next-detail {
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    @media (max-width: 680px) {
      .banner {
        min-height: 154px;
        padding: 20px 22px;
        align-items: flex-start;
        flex-direction: column;
        gap: 16px;
      }

      .next-card {
        width: 100%;
        max-width: none;
        min-width: 0;
      }

      .next-title {
        white-space: normal;
      }
    }
  </style>
</head>

<body>
  <section class="banner" aria-label="Meeting Radar banner">
    <div class="left">
      <div class="eyebrow">
        <span class="signal-dot"></span>
        Calendar to Notes
      </div>

      <h1 class="title">Meeting Radar</h1>

      <p class="subtitle">
        Work + personal meetings • AI notes capture • follow-through
      </p>
    </div>

    <aside class="next-card" aria-label="Next meeting countdown">
      <p class="next-label">Next meeting</p>
      <p class="next-countdown" id="nextCountdown">--</p>
      <p class="next-title" id="nextTitle">Checking calendar signal</p>
      <p class="next-detail" id="nextDetail">Work + personal</p>
    </aside>
  </section>

  <script>
    /*
      Manually maintained meeting list.

      Important:
      This banner does not read Notion Calendar directly.
      Update this list when you want the countdown to reflect upcoming meetings.
    */

    const meetings = [
      {
        title: "BWG - Programs Meeting",
        start: "2026-07-09T08:30:00-04:00"
      },
      {
        title: "Walmart Spark Good Discussion",
        start: "2026-07-09T09:30:00-04:00"
      },
      {
        title: "test meeting",
        start: "2026-07-09T11:45:00-04:00"
      },
      {
        title: "Lunch w/ Beth & Steve",
        start: "2026-07-09T12:30:00-04:00"
      },
      {
        title: "Clifton Hicks Study",
        start: "2026-07-11T11:30:00-04:00"
      },
      {
        title: "BD Team Standing Meeting",
        start: "2026-07-13T12:30:00-04:00"
      },
      {
        title: "Strategy Team Mtg",
        start: "2026-07-14T10:00:00-04:00"
      },
      {
        title: "Budget Meeting",
        start: "2026-07-14T15:00:00-04:00"
      },
      {
        title: "Tar River MWM",
        start: "2026-07-14T19:00:00-04:00"
      },
      {
        title: "Will-Mark Sync",
        start: "2026-07-15T12:30:00-04:00"
      },
      {
        title: "Governance BWG Meeting",
        start: "2026-07-16T10:00:00-04:00"
      }
    ];

    function formatCountdown(ms) {
      if (ms <= 0) return "Now";

      const totalMinutes = Math.floor(ms / 60000);
      const days = Math.floor(totalMinutes / 1440);
      const hours = Math.floor((totalMinutes % 1440) / 60);
      const minutes = totalMinutes % 60;

      if (days > 0) {
        return `${days}d ${hours}h`;
      }

      if (hours > 0) {
        return `${hours}h ${minutes}m`;
      }

      return `${minutes}m`;
    }

    function formatMeetingTime(date) {
      return date.toLocaleString("en-US", {
        weekday: "short",
        hour: "numeric",
        minute: "2-digit",
        hour12: true
      });
    }

    function updateNextMeeting() {
      const now = new Date();

      const upcoming = meetings
        .map(meeting => ({
          ...meeting,
          date: new Date(meeting.start)
        }))
        .filter(meeting => meeting.date > now)
        .sort((a, b) => a.date - b.date);

      const countdownEl = document.getElementById("nextCountdown");
      const titleEl = document.getElementById("nextTitle");
      const detailEl = document.getElementById("nextDetail");

      if (!upcoming.length) {
        countdownEl.textContent = "Clear";
        titleEl.textContent = "No upcoming meetings";
        detailEl.textContent = "Calendar signal quiet";
        return;
      }

      const next = upcoming[0];
      const diff = next.date - now;

      countdownEl.textContent = formatCountdown(diff);
      titleEl.textContent = next.title;
      detailEl.textContent = formatMeetingTime(next.date);
    }

    updateNextMeeting();
    setInterval(updateNextMeeting, 60000);
  </script>
</body>
</html>
