<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JW News Banner</title>

<style>
  :root {
    --navy-950: #0f223f;
    --navy-900: #17345e;
    --navy-700: #2d5d97;
    --gold-300: #e7c978;
    --gold-200: #f3ddb1;
    --white: #ffffff;
    --soft-white: rgba(255,255,255,0.88);
    --muted-white: rgba(255,255,255,0.68);
    --border: rgba(255,255,255,0.18);
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    background: transparent;
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  .banner {
    position: relative;
    overflow: hidden;
    width: 100%;
    min-height: 132px;
    border-radius: 20px;
    padding: 20px 24px;
    color: var(--white);
    background:
      radial-gradient(circle at 88% 18%, rgba(243, 221, 177, 0.22), transparent 28%),
      radial-gradient(circle at 14% 90%, rgba(45, 93, 151, 0.30), transparent 38%),
      linear-gradient(135deg, var(--navy-950), var(--navy-900) 58%, var(--navy-700));
    border: 1px solid var(--border);
    box-shadow:
      0 1px 2px rgba(0,0,0,0.08),
      0 8px 22px rgba(15,34,63,0.18);
  }

  .banner::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(
        120deg,
        rgba(255,255,255,0.10),
        transparent 34%,
        transparent 72%,
        rgba(255,255,255,0.06)
      );
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 20px;
    align-items: center;
  }

  .label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold-200);
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--gold-300);
    box-shadow: 0 0 12px rgba(231, 201, 120, 0.85);
  }

  h1 {
    margin: 0;
    font-size: clamp(28px, 4vw, 38px);
    line-height: 1;
    letter-spacing: -0.05em;
    font-weight: 800;
  }

  .subtitle {
    margin: 10px 0 0;
    max-width: 560px;
    font-size: clamp(14px, 1.8vw, 16px);
    line-height: 1.45;
    color: var(--soft-white);
  }

  .date-card {
    padding: 12px 14px;
    min-width: 170px;
    border-radius: 16px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.16);
    text-align: right;
    backdrop-filter: blur(8px);
  }

  .date-label {
    margin-bottom: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.58);
  }

  .date-main {
    font-size: 15px;
    font-weight: 700;
    color: rgba(255,255,255,0.90);
    line-height: 1.3;
  }

  .date-year {
    margin-top: 3px;
    font-size: 12px;
    color: var(--muted-white);
  }

  @media (max-width: 700px) {
    .banner {
      min-height: 148px;
      padding: 18px 20px;
      border-radius: 18px;
    }

    .content {
      grid-template-columns: 1fr;
      align-items: start;
    }

    .date-card {
      width: 100%;
      text-align: left;
      min-width: 0;
    }
  }

  @media (prefers-reduced-motion: no-preference) {
    .banner {
      background-size: 140% 140%;
      animation: drift 12s ease-in-out infinite alternate;
    }

    @keyframes drift {
      from { background-position: 0% 50%; }
      to { background-position: 100% 50%; }
    }
  }
</style>
</head>

<body>
  <section class="banner" aria-label="JW News section banner">
    <div class="content">
      <div>
        <div class="label">
          <span class="dot"></span>
          News & Updates
        </div>

        <h1>JW NEWS</h1>

        <p class="subtitle">
          Developments, announcements, and updates worth noting.
        </p>
      </div>

      <div class="date-card" aria-label="Current date">
        <div class="date-label">Today</div>
        <div class="date-main" id="dateMain">Loading date…</div>
        <div class="date-year" id="dateYear">Loading year…</div>
      </div>
    </div>
  </section>

  <script>
    function updateDate() {
      const now = new Date();

      const mainFormatter = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/New_York",
        weekday: "long",
        month: "long",
        day: "numeric"
      });

      const yearFormatter = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/New_York",
        year: "numeric"
      });

      document.getElementById("dateMain").textContent = mainFormatter.format(now);
      document.getElementById("dateYear").textContent = yearFormatter.format(now);
    }

    updateDate();
  </script>
</body>
</html>
