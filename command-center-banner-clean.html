<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Command Center Banner Clean</title>

<style>
  :root {
    --blue-950: #10264c;
    --blue-900: #14315f;
    --blue-800: #1d4f91;
    --blue-600: #2783de;
    --white: #ffffff;
    --soft-white: rgba(255, 255, 255, 0.88);
    --muted-white: rgba(255, 255, 255, 0.70);
    --border: rgba(255, 255, 255, 0.20);
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100%;
    background: transparent;
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  .banner {
    position: relative;
    overflow: hidden;
    width: 100%;
    min-height: 180px;
    border-radius: 22px;
    padding: 24px 28px;
    color: var(--white);
    background:
      radial-gradient(circle at 86% 14%, rgba(140, 200, 255, 0.34), transparent 34%),
      radial-gradient(circle at 12% 88%, rgba(39, 131, 222, 0.28), transparent 40%),
      linear-gradient(135deg, var(--blue-950), var(--blue-800) 54%, var(--blue-600));
    border: 1px solid var(--border);
    box-shadow:
      0 1px 2px rgba(0, 0, 0, 0.08),
      0 10px 24px rgba(20, 49, 95, 0.18);
  }

  .banner::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(
        120deg,
        rgba(255,255,255,0.14),
        transparent 34%,
        transparent 72%,
        rgba(255,255,255,0.08)
      );
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 24px;
    align-items: center;
    width: 100%;
  }

  .main-date {
    margin: 0;
    font-size: clamp(32px, 5vw, 50px);
    line-height: 0.96;
    letter-spacing: -0.06em;
    font-weight: 820;
  }

  .subtitle {
    margin: 10px 0 0;
    max-width: 620px;
    font-size: clamp(14px, 2vw, 17px);
    line-height: 1.45;
    color: var(--soft-white);
  }

  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 18px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    min-height: 34px;
    padding: 7px 13px;
    border-radius: 999px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.86);
    font-size: 13px;
    font-weight: 600;
    backdrop-filter: blur(8px);
    white-space: nowrap;
  }

  .pill.secondary {
    color: var(--muted-white);
    font-weight: 500;
  }

  .time-card {
    min-width: 168px;
    padding: 14px 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.16);
    backdrop-filter: blur(10px);
    text-align: right;
  }

  .time-label {
    margin-bottom: 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.58);
  }

  .time {
    font-size: clamp(38px, 6vw, 58px);
    line-height: 1;
    font-weight: 780;
    letter-spacing: -0.05em;
    color: #ffffff;
  }

  .ampm {
    margin-left: 4px;
    font-size: 14px;
    color: rgba(255,255,255,0.72);
  }

  .timezone {
    margin-top: 6px;
    font-size: 11px;
    color: rgba(255,255,255,0.62);
  }

  @media (max-width: 720px) {
    .banner {
      min-height: 210px;
      padding: 22px;
      border-radius: 18px;
    }

    .content {
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: start;
    }

    .time-card {
      width: 100%;
      min-width: 0;
      text-align: left;
    }
  }

  @media (max-width: 440px) {
    .pill {
      width: 100%;
      justify-content: center;
    }
  }

  @media (prefers-reduced-motion: no-preference) {
    .banner {
      background-size: 140% 140%;
      animation: glowShift 10s ease-in-out infinite alternate;
    }

    @keyframes glowShift {
      from { background-position: 0% 50%; }
      to { background-position: 100% 50%; }
    }
  }
</style>
</head>

<body>
  <section class="banner" aria-label="Command Center page banner">
    <div class="content">
      <div>
        <h1 class="main-date" id="mainDate">Loading date…</h1>

        <p class="subtitle">
          Review the day. Choose the next right action.
        </p>

        <div class="meta-row">
          <div class="pill" id="yearLine">Loading year…</div>
          <div class="pill secondary">Review · Plan · Execute</div>
        </div>
      </div>

      <div class="time-card" aria-label="Current time">
        <div class="time-label">Current Time</div>
        <div class="time">
          <span id="clock">--:--</span><span class="ampm" id="ampm"></span>
        </div>
        <div class="timezone">America/New_York</div>
      </div>
    </div>
  </section>

  <script>
    function updateBanner() {
      const now = new Date();

      const mainDateFormatter = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/New_York",
        weekday: "long",
        month: "long",
        day: "numeric"
      });

      const yearFormatter = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/New_York",
        year: "numeric"
      });

      const timeFormatter = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/New_York",
        hour: "numeric",
        minute: "2-digit",
        hour12: true
      });

      const mainDate = mainDateFormatter.format(now);
      const yearLine = yearFormatter.format(now);
      const timeParts = timeFormatter.formatToParts(now);

      let hour = "";
      let minute = "";
      let dayPeriod = "";

      for (const part of timeParts) {
        if (part.type === "hour") hour = part.value;
        if (part.type === "minute") minute = part.value;
        if (part.type === "dayPeriod") dayPeriod = part.value;
      }

      document.getElementById("mainDate").textContent = mainDate;
      document.getElementById("yearLine").textContent = yearLine;
      document.getElementById("clock").textContent = hour + ":" + minute;
      document.getElementById("ampm").textContent = dayPeriod;
    }

    updateBanner();
    setInterval(updateBanner, 1000);
  </script>
</body>
</html>
